<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif;
      background: #1a1a2e;
      color: #eee;
      padding: 16px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .header h1 {
      font-size: 15px;
      font-weight: 600;
      color: #fff;
    }

    .header .icon {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, #e94560, #c23152);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }

    /* Toggle Button */
    .toggle-btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .toggle-btn.start {
      background: linear-gradient(135deg, #e94560, #c23152);
      color: #fff;
    }

    .toggle-btn.start:hover {
      background: linear-gradient(135deg, #ff5a7a, #e94560);
      transform: translateY(-1px);
    }

    .toggle-btn.stop {
      background: #333;
      color: #e94560;
      border: 1px solid #e94560;
    }

    .toggle-btn.stop:hover {
      background: #3a1a1a;
    }

    /* Status */
    .status {
      text-align: center;
      font-size: 12px;
      color: #888;
      margin-top: 8px;
      min-height: 16px;
    }

    .status.error { color: #e94560; }
    .status.active { color: #4caf50; }

    /* Divider */
    .divider {
      border: none;
      border-top: 1px solid #2a2a4a;
      margin: 16px 0;
    }

    /* Settings */
    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .setting-label {
      font-size: 13px;
      color: #aaa;
    }

    select, input[type="range"] {
      background: #16213e;
      color: #eee;
      border: 1px solid #2a2a4a;
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 13px;
      outline: none;
    }

    select:focus { border-color: #e94560; }

    input[type="range"] {
      -webkit-appearance: none;
      width: 120px;
      height: 4px;
      border: none;
      padding: 0;
      border-radius: 2px;
      background: #2a2a4a;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #e94560;
      cursor: pointer;
    }

    .font-size-value {
      font-size: 12px;
      color: #888;
      min-width: 30px;
      text-align: right;
    }

    /* Checkbox row */
    .check-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .check-row input[type="checkbox"] {
      accent-color: #e94560;
      width: 16px;
      height: 16px;
    }

    .check-row label {
      font-size: 13px;
      color: #aaa;
      cursor: pointer;
    }

    /* Hint */
    .hint {
      font-size: 11px;
      color: #555;
      margin-top: 12px;
      line-height: 1.5;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="icon">CC</div>
    <h1>影片字幕產生器</h1>
  </div>

  <button id="toggleBtn" class="toggle-btn start">
    <span id="toggleIcon">&#9654;</span>
    <span id="toggleText">開始產生字幕</span>
  </button>
  <div id="status" class="status"></div>

  <hr class="divider">

  <!-- Settings -->
  <div class="setting-row">
    <span class="setting-label">來源語言</span>
    <select id="sourceLang">
      <option value="en-US">English (US)</option>
      <option value="en-GB">English (UK)</option>
      <option value="ja">日本語</option>
      <option value="ko">한국어</option>
      <option value="fr">Français</option>
      <option value="de">Deutsch</option>
      <option value="es">Español</option>
    </select>
  </div>

  <div class="setting-row">
    <span class="setting-label">字幕大小</span>
    <input type="range" id="fontSize" min="12" max="32" value="18" step="1">
    <span class="font-size-value" id="fontSizeValue">18px</span>
  </div>

  <div class="check-row">
    <input type="checkbox" id="showOriginal" checked>
    <label for="showOriginal">顯示原文</label>
  </div>

  <div class="check-row">
    <input type="checkbox" id="showTranslation" checked>
    <label for="showTranslation">顯示繁中翻譯</label>
  </div>

  <p class="hint">
    使用麥克風收音辨識影片語音<br>
    建議開啟喇叭播放（非耳機）以獲得最佳效果
  </p>

  <script src="popup.js"></script>
</body>
</html>
